<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CRM Atendimentos</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="CRM Atendimentos">
    <meta name="theme-color" content="#0f172a"> 
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        html, body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f8fafc; 
            margin: 0; padding: 0;
            overscroll-behavior-y: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        .chart-container { position: relative; height: 260px; width: 100%; }
        .table-container { overflow-x: auto; -webkit-overflow-scrolling: touch; touch-action: auto; }
    </style>
</head>
<body class="text-slate-800 antialiased relative md:select-text">

    <div id="tela-login" class="fixed inset-0 bg-slate-900/90 backdrop-blur-md flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-2xl shadow-2xl border border-slate-200 w-full max-w-sm p-6 space-y-4">
            <div class="text-center space-y-1">
                <div class="bg-teal-500 text-slate-900 p-3 rounded-full w-12 h-12 flex items-center justify-center mx-auto shadow-md">
                    <i class="fa-solid fa-lock text-lg"></i>
                </div>
                <h2 class="text-lg font-bold text-slate-800 tracking-tight">Identificação do Consultor</h2>
                <p class="text-xs text-slate-400">Insira suas credenciais para acessar</p>
            </div>
            
            <div id="login-erro" class="bg-rose-50 text-rose-700 border border-rose-200 text-xs font-bold p-3 rounded-xl text-center hidden">
                <i class="fa-solid fa-circle-xmark mr-1"></i> Usuário ou PIN incorreto!
            </div>

            <form id="formLogin" class="space-y-3.5" onsubmit="autenticarUsuario(event)">
                <div>
                    <label class="block text-xs font-bold uppercase text-slate-400 mb-1 tracking-wide">Usuário</label>
                    <select id="loginUsuario" required class="w-full text-sm bg-slate-50 border border-slate-200 rounded-xl px-3 py-2.5 focus:outline-none focus:border-teal-500 min-h-[46px]">
                        <option value="">Selecione seu nome...</option>
                        <option value="Claudia">Claudia</option>
                        <option value="Fabio">Fabio</option>
                        <option value="Maicon">Maicon</option>
                        <option value="Adm">Administrador</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase text-slate-400 mb-1 tracking-wide">PIN (4 dígitos)</label>
                    <input type="password" id="loginPin" required maxlength="4" placeholder="••••" pattern="\d*" inputmode="numeric"
                           class="w-full text-center text-lg tracking-widest bg-slate-50 border border-slate-200 rounded-xl px-3 py-2 focus:outline-none focus:border-teal-500 min-h-[46px]">
                </div>
                <button type="submit" class="w-full bg-teal-600 hover:bg-teal-700 text-white font-bold py-3 rounded-xl text-sm shadow-md transition-colors min-h-[46px]">
                    <i class="fa-solid fa-right-to-bracket mr-1"></i> Entrar no Painel
                </button>
            </form>
        </div>
    </div>

    <div id="modal-novo" class="fixed inset-0 bg-slate-900/90 backdrop-blur-sm flex items-center justify-center z-50 p-4 hidden">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md flex flex-col max-h-[90vh] overflow-hidden">
            <div class="px-5 py-4 border-b border-slate-100 flex justify-between items-center bg-slate-50 shrink-0">
                <h3 id="modal-titulo" class="font-bold text-slate-800 text-lg flex items-center gap-2"><i class="fa-solid fa-file-pen text-teal-600"></i> Ficha do Atendimento</h3>
                <button type="button" onclick="fecharModalNovo()" class="text-slate-400 hover:text-rose-500 transition-colors w-8 h-8 flex items-center justify-center rounded-full bg-slate-200/50">
                    <i class="fa-solid fa-xmark text-lg"></i>
                </button>
            </div>
            
            <div class="p-5 overflow-y-auto">
                <form id="form-novo" class="space-y-4" onsubmit="salvarNovoAtendimento(event)">
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Data</label>
                            <input type="date" id="novo-data" required class="w-full text-sm bg-slate-50 border border-slate-200 rounded-xl px-3 py-2.5 focus:border-teal-500 outline-none">
                        </div>
                        <div id="modal-container-consultor">
                            <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Consultor</label>
                            <select id="novo-consultor" required class="w-full text-sm bg-slate-50 border border-slate-200 rounded-xl px-3 py-2.5 focus:border-teal-500 outline-none">
                                <option value="Claudia">Claudia</option>
                                <option value="Fabio">Fabio</option>
                                <option value="Maicon">Maicon</option>
                            </select>
                        </div>
                    </div>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                        <div>
                            <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Nome do Cliente</label>
                            <input type="text" id="novo-nome" required class="w-full text-sm bg-slate-50 border border-slate-200 rounded-xl px-3 py-2.5 focus:border-teal-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Telefone</label>
                            <input type="tel" id="novo-telefone" class="w-full text-sm bg-slate-50 border border-slate-200 rounded-xl px-3 py-2.5 focus:border-teal-500 outline-none">
